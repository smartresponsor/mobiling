name: Materialize Mobiling baseline

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/materialize.yml
      - tools/materialize_android.py
      - tools/materialize_ios.py
      - tools/materialize_edge_runtime.py
      - tools/materialize_edge_storage.py
      - tools/materialize_finalize.py

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Materialize Android
        run: python tools/materialize_android.py
      - name: Materialize iOS
        run: python tools/materialize_ios.py
      - name: Materialize Mobile Edge runtime
        run: python tools/materialize_edge_runtime.py
      - name: Materialize Mobile Edge storage
        run: python tools/materialize_edge_storage.py
      - name: Finalize repository
        run: python tools/materialize_finalize.py

      - name: Remove one-time bootstrap
        shell: bash
        run: |
          rm -rf .materialize
          rm -f tools/materialize_android.py
          rm -f tools/materialize_ios.py
          rm -f tools/materialize_edge_runtime.py
          rm -f tools/materialize_edge_storage.py
          rm -f tools/materialize_finalize.py
          rm -f .github/workflows/materialize.yml

      - name: Validate repository
        run: python tools/validate_repository.py

      - name: Build Mobile Edge
        working-directory: mobile-edge
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Compile Android
        working-directory: mobile-client/android
        run: gradle :app:compileDebugKotlin --stacktrace

      - name: Validate iOS package structure
        working-directory: mobile-client/ios
        run: swift package dump-package > /dev/null

      - name: Remove generated build output
        shell: bash
        run: |
          rm -rf mobile-edge/node_modules mobile-edge/dist
          find mobile-client/android -type d -name build -prune -exec rm -rf {} +
          rm -rf mobile-client/android/.gradle mobile-client/ios/.build

      - name: Commit materialized baseline
        shell: bash
        run: |
          git config user.name "smartresponsor-materializer"
          git config user.email "taa0662621456@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No materialization changes"
            exit 0
          fi
          git commit -m "materialize mobile runtime baseline"
          git push origin master
