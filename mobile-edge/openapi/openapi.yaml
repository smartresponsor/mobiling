openapi: 3.1.0
info:
  title: SmartResponsor Mobile Edge
  version: v4
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health
      responses: { '200': { description: OK } }
  /mobile/config:
    get:
      summary: Config flags
      responses:
        '200':
          description: Flags
          headers:
            X-SR-Config-Signature: { description: HMAC hex, schema: { type: string } }
            X-SR-Secret-Version: { description: Secret version, schema: { type: string } }
          content:
            application/json:
              schema: { type: object }
  /mobile/entitlement:
    get:
      summary: Entitlement grants
      security: [ { bearerAuth: [] } ]
      responses: { '200': { description: Grants, content: { application/json: { schema: { type: object } } } } }
  /mobile/push/register:
    post:
      summary: Register push token
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRegisterV1'
      responses: { '204': { description: No Content } }
  /mobile/receipt/verify:
    post:
      summary: Verify purchase receipt
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptVerifyV1'
      responses: { '200': { description: OK } }
  /mobile/analytic/batch:
    post:
      summary: Analytics JSON batch
      parameters:
        - in: header
          name: X-SR-Analytic-Signature
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnalyticBatchJsonV1' }
      responses: { '202': { description: Accepted } }
  /mobile/analytic/batch-ndjson:
    post:
      summary: Analytics NDJSON
      parameters:
        - in: header
          name: X-SR-Analytic-Signature
          required: true
          schema: { type: string }
      responses: { '202': { description: Accepted } }
  /mobile/sync/event:
    post:
      summary: Client sync event
      responses: { '204': { description: No Content } }
  /mobile/session:
    post:
      summary: Dev token
      responses: { '200': { description: OK } }
  /oauth/token:
    post:
      summary: Dev OAuth token
      responses: { '200': { description: OK } }
  /admin/stats:
    get:
      summary: Admin stats
      parameters:
        - in: header
          name: X-Admin-Token
          required: true
          schema: { type: string }
      responses: { '200': { description: OK } }
  /admin/schema/{name}/{ver}:
    get:
      summary: Schema fetch
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: path
          name: ver
          required: true
          schema: { type: string }
        - in: header
          name: X-Admin-Token
          required: true
          schema: { type: string }
      responses: { '200': { description: OK } }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    PushRegisterV1:
      type: object
      required: [deviceId, token]
      properties:
        deviceId: { type: string }
        token: { type: string }
        platform: { type: string, enum: [android, ios, web] }
    ReceiptVerifyV1:
      type: object
      required: [transactionId, productId, platform, receipt]
      properties:
        transactionId: { type: string }
        productId: { type: string }
        platform: { type: string, enum: [android, ios] }
        receipt: { type: string }
    AnalyticBatchJsonV1:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            type: object
            required: [type, ts]
            properties:
              type: { type: string }
              ts: { type: number }
